const D1={slop:"A bright pop-up: \"YOU WON A RARE PRIZE! Claim in 5 minutes or it disappears!\" Screen flashes. Countdown starts. Big CLAIM NOW button.",fk:{dp:"State Hijack → urgency compression → decision collapse",why:["Underdeveloped impulse regulation.","Countdown timers create false scarcity.","Rewards activate reward circuitry faster than reasoning.","Youth assume games are safe spaces."],watch:["May feel embarrassed.","Some insist games DO give prizes — avoid shaming.","May not understand urgency is a signal, not a command."],fix:["Your feelings speeding up is a safety clue.","Real rewards don’t force you to rush.","If something tries to make you hurry, pause first."],safety:"Don’t say ‘never click anything’ — creates fear, not literacy.",cultural:"Adapt to local gaming platforms. Low-connectivity: use offline analogies."},clean:"A pop-up says you won a prize and must claim it fast. It tries to rush you. When feelings speed up, pause. Real rewards don’t force you to hurry.",prompts:["How did the countdown make you feel?","What happens in your body when rushed?","Why do scammers want you to hurry?","What could you do instead?"],ext:{act:"Draw ‘Me when calm’ and ‘Me when rushed.’ Discuss how the rushed version makes different choices.",goal:"Emotional self-awareness as fraud-resilience."}};
